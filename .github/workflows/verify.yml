name: Verify UCP Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'registry.json'
      - 'index.html'

# Note: This workflow does not use any untrusted input (issue titles, PR bodies,
# commit messages, etc.) in run: commands. All run: blocks use only hardcoded
# strings and script paths. Safe from command injection.

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Verify UCP nodes
        run: python scripts/verify.py

      - name: Commit status updates
        run: |
          git config user.name "ucp-directory-bot"
          git config user.email "bot@ucp-directory.github.io"
          git add registry.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main
            git commit -m "chore: update node verification statuses"
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html registry.json CNAME .nojekyll _site/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac2b3c603fc # v4.0.5
